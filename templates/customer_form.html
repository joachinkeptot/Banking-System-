{% extends "base.html" %}
{% block title %}{{ action }} Customer{% endblock %}
{% block page_title %}{{ action }} Customer{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header"><h2>{{ action }} Customer</h2></div>
  <div class="card-body" style="padding:24px;">
    <form method="post" class="form-wrap">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" name="first_name" required value="{{ customer.first_name if customer else '' }}">
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" name="last_name" required value="{{ customer.last_name if customer else '' }}">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ customer.email if customer else '' }}">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" name="phone_num" value="{{ customer.phone_num if customer else '' }}">
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" name="address" value="{{ customer.address if customer else '' }}">
      </div>
      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" name="date_of_birth" value="{{ customer.date_of_birth if customer else '' }}">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">{{ action }} Customer</button>
        <a href="{{ url_for('customers') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
