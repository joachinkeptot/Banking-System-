{% extends "base.html" %}
{% block title %}New Loan{% endblock %}
{% block page_title %}New Loan{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header"><h2>Loan Details</h2></div>
  <div class="card-body" style="padding:24px;">
    <form method="post" class="form-wrap">
      <div class="form-group">
        <label>Account</label>
        <select name="account_id" required>
          <option value="">-- Select Account --</option>
          {% for a in accounts %}
          <option value="{{ a.account_id }}">{{ a.label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Loan Type</label>
        <select name="loan_type" required>
          <option>Personal</option>
          <option>Mortgage</option>
          <option>Auto</option>
          <option>Student</option>
          <option>Business</option>
        </select>
      </div>
      <div class="form-group">
        <label>Amount ($)</label>
        <input type="number" name="amount" step="0.01" min="1" required>
      </div>
      <div class="form-group">
        <label>Interest Rate (%)</label>
        <input type="number" name="interest_rate" step="0.01" min="0" max="100" required>
      </div>
      <div class="form-group">
        <label>Start Date</label>
        <input type="date" name="start_date" required>
      </div>
      <div class="form-group">
        <label>End Date</label>
        <input type="date" name="end_date" required>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option>Active</option>
          <option>Paid</option>
          <option>Defaulted</option>
        </select>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Create Loan</button>
        <a href="{{ url_for('loans') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
