{% extends "base.html" %}
{% block title %}New Transaction{% endblock %}
{% block page_title %}New Transaction{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header"><h2>Transaction Details</h2></div>
  <div class="card-body" style="padding:24px;">
    <form method="post" class="form-wrap">
      <div class="form-group">
        <label>Account</label>
        <select name="account_id" required>
          <option value="">-- Select Account --</option>
          {% for a in accounts %}
          <option value="{{ a.account_id }}">{{ a.label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Type</label>
        <select name="type" required>
          <option>Deposit</option>
          <option>Withdrawal</option>
          <option>Transfer</option>
          <option>Payment</option>
        </select>
      </div>
      <div class="form-group">
        <label>Amount ($)</label>
        <input type="number" name="amount" step="0.01" min="0.01" required>
      </div>
      <div class="form-group">
        <label>Date & Time</label>
        <input type="datetime-local" name="date" required>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" name="description" placeholder="Optional note">
      </div>
      <div class="form-group">
        <label>Currency</label>
        <select name="currency_type">
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
          <option value="GBP">GBP</option>
          <option value="CAD">CAD</option>
        </select>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Record Transaction</button>
        <a href="{{ url_for('transactions') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
